<!DOCTYPE html>
<html lang="en" class="">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>{% block title %}{{ title | default("fullstackpm.tech") }}{% endblock %}</title>
  <meta name="description" content="{% block description %}{{ meta_description | default("Portfolio of Harsha Cheruku — Full Stack AI Product Manager") }}{% endblock %}">
  <meta name="author" content="Harsha Cheruku">

  <!-- Canonical -->
  <link rel="canonical" href="{{ config.site_url }}{{ request.url.path }}">

  <!-- Open Graph -->
  <meta property="og:title" content="{% block og_title %}{{ title | default("fullstackpm.tech") }}{% endblock %}">
  <meta property="og:description" content="{% block og_description %}{{ meta_description | default("Portfolio of Harsha Cheruku — Full Stack AI Product Manager") }}{% endblock %}">
  <meta property="og:type" content="{% block og_type %}website{% endblock %}">
  <meta property="og:url" content="{{ config.site_url }}{{ request.url.path }}">
  <meta property="og:image" content="{% block og_image %}{{ config.og_image }}{% endblock %}">
  <meta property="og:image:width" content="1024">
  <meta property="og:image:height" content="1024">
  <meta property="og:site_name" content="{{ config.site_title }}">

  <!-- Twitter Card -->
  <meta name="twitter:card" content="summary_large_image">
  <meta name="twitter:site" content="{{ config.twitter_handle }}">
  <meta name="twitter:creator" content="{{ config.twitter_handle }}">
  <meta name="twitter:title" content="{% block twitter_title %}{{ title | default("fullstackpm.tech") }}{% endblock %}">
  <meta name="twitter:description" content="{% block twitter_description %}{{ meta_description | default("Portfolio of Harsha Cheruku — Full Stack AI Product Manager") }}{% endblock %}">
  <meta name="twitter:image" content="{% block twitter_image %}{{ config.og_image }}{% endblock %}">

  <!-- Favicon -->
  <link rel="icon" type="image/png" href="/static/img/FSPM.png?v=3">
  <link rel="apple-touch-icon" href="/static/img/FSPM.png?v=3">
  <meta name="msapplication-TileImage" content="/static/img/FSPM.png?v=3">

  <!-- Fonts: Inter (UI) + Source Serif 4 (editorial) + JetBrains Mono -->
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&family=Source+Serif+4:opsz,wght@8..60,400;8..60,600;8..60,700;8..60,800;8..60,900&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet">

  <!-- ─── Editorial design system (Stratechery-inspired) ─── -->
  <style>
    .serif { font-family: 'Source Serif 4', Charter, 'Iowan Old Style', Georgia, serif; }

    /* Kicker: small all-caps label */
    .kicker {
      font-size: 12px; font-weight: 800; letter-spacing: 0.16em;
      text-transform: uppercase; line-height: 1;
    }

    /* Section rule (heavy heading bar) */
    .section-rule {
      display: flex; align-items: center; gap: 16px;
      padding-bottom: 12px; margin-bottom: 1.75rem;
      border-bottom: 3px solid var(--color-text-primary);
    }
    .section-rule .label {
      font-size: 13px; font-weight: 900; letter-spacing: 0.18em;
      text-transform: uppercase; color: var(--color-text-primary);
    }
    .section-rule .meta { margin-left: auto; }

    /* Feature headline — the heavyweight */
    .feature-headline {
      font-family: 'Source Serif 4', Charter, Georgia, serif;
      font-size: clamp(2.25rem, 5vw, 3.75rem);
      font-weight: 800;
      line-height: 1.05;
      letter-spacing: -0.025em;
      color: var(--color-text-primary);
      margin: 0 0 1.25rem;
    }
    .feature-dek {
      font-family: 'Source Serif 4', Charter, Georgia, serif;
      font-size: clamp(1.125rem, 2vw, 1.4rem);
      line-height: 1.45;
      color: var(--color-text-secondary);
      margin: 0 0 1.5rem;
      font-weight: 400;
    }

    /* Column headlines */
    .column-headline {
      font-family: 'Source Serif 4', Charter, Georgia, serif;
      font-size: 1.25rem;
      font-weight: 700;
      line-height: 1.2;
      letter-spacing: -0.015em;
      color: var(--color-text-primary);
      margin: 0 0 10px;
      transition: color 0.15s;
    }
    .column-dek {
      font-size: 0.92rem;
      line-height: 1.5;
      color: var(--color-text-secondary);
      margin: 0;
    }

    /* Article body (long-form serif) */
    .article-body {
      font-family: 'Source Serif 4', Charter, Georgia, serif;
      font-size: 1.125rem;
      line-height: 1.7;
      color: var(--color-text-primary);
    }
    .article-body p { margin: 0 0 1.25rem; }
    .article-body p:last-child { margin-bottom: 0; }

    /* Card hover affordance */
    .article-link { display: block; text-decoration: none; }
    .article-link:hover .column-headline,
    .article-link:hover .feature-headline { color: var(--color-accent); }

    /* Feature image / placeholder */
    .feature-image {
      width: 100%; aspect-ratio: 16/9;
      background: linear-gradient(135deg, #1f2937, #0f172a);
      color: #94a3b8;
      border-radius: 4px;
      display: flex; align-items: center; justify-content: center;
      font-size: 11px; letter-spacing: 0.18em; font-weight: 700;
      text-transform: uppercase;
    }

    /* Source meta */
    .source-meta {
      font-size: 11px; font-weight: 700; letter-spacing: 0.1em;
      text-transform: uppercase; color: var(--color-text-tertiary);
    }
    .source-meta .accent { color: var(--color-accent); }

    /* Hairline divider for article cards */
    .article-card { padding: 1.25rem 0; border-bottom: 1px solid var(--color-border); }
    .article-card:first-child { padding-top: 0; }
    .article-card:last-child { border-bottom: none; padding-bottom: 0; }

    /* Category chip — used on article + feed pages */
    .cat-chip {
      font-size: 10px; font-weight: 800; letter-spacing: 0.1em;
      text-transform: uppercase; padding: 3px 10px; border-radius: 999px;
    }
    .cat-chip.pm   { background-color: var(--color-blue-100);    color: var(--color-blue-900); }
    .cat-chip.eng  { background-color: var(--color-success-100); color: var(--color-success-900); }
    .cat-chip.ai   { background-color: #ede9fe; color: #5b21b6; }
    .cat-chip.strat{ background-color: var(--color-warning-100); color: var(--color-warning-900); }
  </style>

  <!-- Tailwind CSS (CDN) -->
  <script src="https://cdn.tailwindcss.com"></script>
  <script>
    tailwind.config = {
      theme: {
        extend: {
          fontFamily: {
            sans: ['Inter', 'system-ui', '-apple-system', 'sans-serif'],
            mono: ['JetBrains Mono', 'monospace'],
          },
        },
      },
    }
  </script>

  <!-- Design System Tokens -->
  <link rel="stylesheet" href="/static/css/custom.css">

  <!-- Dark mode: apply before paint to prevent flash -->
  <script>
    (function() {
      var theme = localStorage.getItem('theme');
      if (!theme) {
        theme = window.matchMedia('(prefers-color-scheme: dark)').matches ? 'dark' : 'light';
      }
      if (theme === 'dark') {
        document.documentElement.classList.add('dark');
      }
    })();
  </script>

  {% block head %}{% endblock %}
</head>
<body class="min-h-screen font-sans antialiased"
      style="background-color: var(--color-bg-primary); color: var(--color-text-primary);">

  <!-- Navigation -->
  {% include "partials/navbar.html" %}

  <!-- Main content -->
  <main class="mx-auto max-w-[1200px] px-4 sm:px-6">
    {% block content %}{% endblock %}
  </main>

  <!-- Footer -->
  {% include "partials/footer.html" %}

  <!-- HTMX (CDN) -->
  <script src="https://unpkg.com/htmx.org@2.0.2" integrity="sha384-Y7hw+L/jvKeWIRRkqWYfPcvVxHzVzn5REgzbawhxAuQGwCXuE+cDVtAu2B3crQxD" crossorigin="anonymous"></script>

  <!-- Site JS -->
  <script src="/static/js/main.js"></script>

  {% block scripts %}{% endblock %}
</body>
</html>
