<!-- partials/newsletter_signup.html — Kit subscribe via fetch (no redirect) -->
<form id="fspm-newsletter-form"
      style="max-width:420px;margin:0 auto;"
      onsubmit="fspmSubscribe(event)">
  <div style="display:flex;gap:8px;flex-wrap:wrap;">
    <div style="flex:1 0 200px;">
      <input id="fspm-email"
             name="email_address"
             aria-label="Email Address"
             placeholder="your@email.com"
             required
             type="email"
             style="width:100%;padding:0.65rem 1rem;border-radius:8px;border:1px solid var(--color-border);background:var(--color-bg-primary);color:var(--color-text-primary);font-size:0.9rem;box-sizing:border-box;">
    </div>
    <button id="fspm-submit"
            type="submit"
            style="padding:0.65rem 1.25rem;border-radius:8px;background:var(--color-accent);color:#fff;font-weight:600;font-size:0.9rem;border:none;cursor:pointer;white-space:nowrap;flex-shrink:0;">
      Subscribe
    </button>
  </div>
  <p id="fspm-msg" style="font-size:12px;color:var(--color-text-tertiary);margin:10px 0 0;text-align:center;">No spam. Unsubscribe any time.</p>
</form>

<script>
async function fspmSubscribe(e) {
  e.preventDefault();
  const btn = document.getElementById('fspm-submit');
  const msg = document.getElementById('fspm-msg');
  const email = document.getElementById('fspm-email').value;

  btn.disabled = true;
  btn.textContent = 'Subscribing…';

  try {
    const res = await fetch('https://app.kit.com/forms/9506742/subscriptions', {
      method: 'POST',
      headers: { 'Content-Type': 'application/x-www-form-urlencoded' },
      body: 'email_address=' + encodeURIComponent(email),
    });
    if (res.ok || res.status === 200 || res.status === 201) {
      document.getElementById('fspm-newsletter-form').innerHTML =
        '<p style="font-size:0.95rem;font-weight:600;color:var(--color-accent);text-align:center;">You\'re in. Check your inbox to confirm.</p>';
    } else {
      throw new Error('non-2xx');
    }
  } catch (_) {
    msg.textContent = 'Something went wrong — try again or email harsha@fullstackpm.tech';
    msg.style.color = '#dc2626';
    btn.disabled = false;
    btn.textContent = 'Subscribe';
  }
}
</script>
